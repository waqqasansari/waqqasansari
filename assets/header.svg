<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 240" width="1000" height="240" font-family="'Cascadia Mono', 'Consolas', 'Menlo', 'DejaVu Sans Mono', monospace">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070f"/>
      <stop offset="50%" stop-color="#0a0f1d"/>
      <stop offset="100%" stop-color="#03050a"/>
    </linearGradient>

    <!-- Cyan Glow Filter -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Tech Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00f2fe" stroke-width="0.5" opacity="0.05"/>
    </pattern>

    <!-- CRT Scanlines -->
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#00f2fe" opacity="0.06"/>
    </pattern>

    <!-- ANSI Shadow figlet for "WAQQAS ANSARI" -->
    <g id="ansi-name" font-size="14" font-weight="400" letter-spacing="0">
      <text x="500" y="90"  text-anchor="middle" xml:space="preserve">██╗&#160;&#160;&#160;&#160;██╗&#160;&#160;█████╗&#160;&#160;&#160;██████╗&#160;&#160;&#160;██████╗&#160;&#160;&#160;█████╗&#160;&#160;███████╗&#160;&#160;&#160;█████╗&#160;&#160;███╗&#160;&#160;&#160;██╗&#160;███████╗&#160;&#160;█████╗&#160;&#160;██████╗&#160;&#160;██╗</text>
      <text x="500" y="103" text-anchor="middle" xml:space="preserve">██║&#160;&#160;&#160;&#160;██║&#160;██╔══██╗&#160;██╔═══██╗&#160;██╔═══██╗&#160;██╔══██╗&#160;██╔════╝&#160;&#160;██╔══██╗&#160;████╗&#160;&#160;██║&#160;██╔════╝&#160;██╔══██╗&#160;██╔══██╗&#160;██║</text>
      <text x="500" y="116" text-anchor="middle" xml:space="preserve">██║&#160;█╗&#160;██║&#160;███████║&#160;██║&#160;&#160;&#160;██║&#160;██║&#160;&#160;&#160;██║&#160;███████║&#160;███████╗&#160;&#160;███████║&#160;██╔██╗&#160;██║&#160;███████╗&#160;███████║&#160;██████╔╝&#160;██║</text>
      <text x="500" y="129" text-anchor="middle" xml:space="preserve">██║███╗██║&#160;██╔══██║&#160;██║▄▄&#160;██║&#160;██║▄▄&#160;██║&#160;██╔══██║&#160;╚════██║&#160;&#160;██╔══██║&#160;██║╚██╗██║&#160;╚════██║&#160;██╔══██║&#160;██╔══██╗&#160;██║</text>
      <text x="500" y="142" text-anchor="middle" xml:space="preserve">╚███╔███╔╝&#160;██║&#160;&#160;██║&#160;╚██████╔╝&#160;╚██████╔╝&#160;██║&#160;&#160;██║&#160;███████║&#160;&#160;██║&#160;&#160;██║&#160;██║&#160;╚████║&#160;███████║&#160;██║&#160;&#160;██║&#160;██║&#160;&#160;██║&#160;██║</text>
      <text x="500" y="155" text-anchor="middle" xml:space="preserve">&#160;╚══╝╚══╝&#160;&#160;╚═╝&#160;&#160;╚═╝&#160;&#160;╚══▀▀═╝&#160;&#160;&#160;╚══▀▀═╝&#160;&#160;╚═╝&#160;&#160;╚═╝&#160;╚══════╝&#160;&#160;╚═╝&#160;&#160;╚═╝&#160;╚═╝&#160;&#160;╚═══╝&#160;╚══════╝&#160;╚═╝&#160;&#160;╚═╝&#160;╚═╝&#160;&#160;╚═╝&#160;╚═╝</text>
    </g>
  </defs>

  <!-- Background and Grid -->
  <rect width="1000" height="240" fill="url(#bg)"/>
  <rect width="1000" height="240" fill="url(#grid)"/>
  <rect width="1000" height="240" fill="url(#scan)"/>

  <!-- Cyberpunk Corner Accents -->
  <g stroke="#00f2fe" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M 12 12 L 12 32 M 12 12 L 32 12" />
    <path d="M 988 12 L 988 32 M 988 12 L 968 12" />
    <path d="M 12 228 L 12 208 M 12 228 L 32 228" />
    <path d="M 988 228 L 988 208 M 988 228 L 968 228" />
  </g>

  <!-- ──────────── GLITCHED ANSI SHADOW NAME ──────────── -->
  <g>
    <!-- Magenta Chromatic Aberration Layer -->
    <g fill="#ff0077" opacity="0.8">
      <use href="#ansi-name" x="3" y="2">
        <animate attributeName="x" values="3; 6; -2; 3; 7; -1; 3" keyTimes="0; 0.05; 0.1; 0.15; 0.2; 0.85; 1" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="y" values="2; 0; 4; 2; 5; 0; 2" keyTimes="0; 0.05; 0.1; 0.15; 0.2; 0.85; 1" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8; 1; 0.2; 0.8; 0.1; 0.9; 0.8" keyTimes="0; 0.05; 0.1; 0.15; 0.2; 0.85; 1" dur="2.5s" repeatCount="indefinite"/>
      </use>
    </g>

    <!-- Cyan Chromatic Aberration Layer (glowing) -->
    <g fill="#00f2fe" opacity="0.8" filter="url(#glow-cyan)">
      <use href="#ansi-name" x="-3" y="-2">
        <animate attributeName="x" values="-3; -7; 4; -3; -6; 2; -3" keyTimes="0; 0.05; 0.1; 0.15; 0.2; 0.85; 1" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="y" values="-2; 0; -4; -2; -5; 0; -2" keyTimes="0; 0.05; 0.1; 0.15; 0.2; 0.85; 1" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8; 0.1; 0.9; 0.2; 1; 0.7; 0.8" keyTimes="0; 0.05; 0.1; 0.15; 0.2; 0.85; 1" dur="2.5s" repeatCount="indefinite"/>
      </use>
    </g>

    <!-- Main White/Phosphor Layer -->
    <g fill="#f3f4f6">
      <use href="#ansi-name">
        <animate attributeName="x" values="0; 2; -2; 0; 2; -2; 0" keyTimes="0; 0.05; 0.1; 0.15; 0.2; 0.85; 1" dur="2.5s" repeatCount="indefinite"/>
      </use>
    </g>

    <!-- Glitch Horizontal Block Cuts -->
    <rect x="80" y="108" width="840" height="3" fill="#00f2fe" opacity="0">
      <animate attributeName="opacity" values="0; 0; 0.8; 0; 0.9; 0; 0" keyTimes="0; 0.08; 0.09; 0.12; 0.13; 0.15; 1" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="x" values="80; 60; 100; 80; 50; 80; 80" keyTimes="0; 0.08; 0.09; 0.12; 0.13; 0.15; 1" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="80" y="132" width="840" height="4" fill="#ff0077" opacity="0">
      <animate attributeName="opacity" values="0; 0.7; 0; 0.8; 0; 0" keyTimes="0; 0.14; 0.16; 0.18; 0.20; 1" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="x" values="80; 95; 80; 65; 80; 80" keyTimes="0; 0.14; 0.16; 0.18; 0.20; 1" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="80" y="148" width="840" height="2" fill="#00f2fe" opacity="0">
      <animate attributeName="opacity" values="0; 0; 0.6; 0; 0" keyTimes="0; 0.5; 0.51; 0.54; 1" dur="2.5s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
