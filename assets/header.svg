<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" width="1000" height="360" font-family="'JetBrains Mono', 'Fira Code', 'Courier New', monospace">

  <!-- в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ DEFS: gradients, filters, glow в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ -->
  <defs>
    <!-- Background gradient: deep navy вҶ’ near-black -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0a0e1a"/>
      <stop offset="50%"  stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#06080f"/>
    </linearGradient>

    <!-- Cyan glow for the ASCII art -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Stronger glow for highlights -->
    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00D9FF" stroke-width="0.3" opacity="0.08"/>
    </pattern>

    <!-- Mask used to "reveal" the ASCII art left-to-right (the typing effect) -->
    <mask id="reveal">
      <rect x="0" y="0" width="1000" height="360" fill="black"/>
      <rect x="0" y="0" width="0" height="360" fill="white">
        <animate attributeName="width"
                 values="0; 0; 980; 980"
                 keyTimes="0; 0.05; 0.55; 1"
                 dur="8s"
                 repeatCount="indefinite"/>
      </rect>
    </mask>
  </defs>

  <!-- в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ BACKGROUND в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ -->
  <rect width="1000" height="360" fill="url(#bg)"/>
  <rect width="1000" height="360" fill="url(#grid)"/>

  <!-- Top + bottom accent lines -->
  <line x1="0" y1="0"   x2="1000" y2="0"   stroke="#00D9FF" stroke-width="1" opacity="0.6"/>
  <line x1="0" y1="360" x2="1000" y2="360" stroke="#00D9FF" stroke-width="1" opacity="0.6"/>

  <!-- Faint floating "binary rain" particles for atmosphere -->
  <g opacity="0.18" fill="#00D9FF" font-size="11">
    <text x="50"  y="40">01001101</text>
    <text x="880" y="60">11010</text>
    <text x="30"  y="320">{ }</text>
    <text x="920" y="310">вҲ‘</text>
    <text x="100" y="70" opacity="0.5">&gt;_</text>
    <text x="850" y="330" opacity="0.5">вҲҮ</text>
  </g>

  <!-- в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ TERMINAL CHROME (window dots) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ -->
  <g transform="translate(30, 30)">
    <circle cx="0"  cy="0" r="6" fill="#FF5F56"/>
    <circle cx="20" cy="0" r="6" fill="#FFBD2E"/>
    <circle cx="40" cy="0" r="6" fill="#27C93F"/>
    <text x="470" y="4" fill="#4a5568" font-size="11" text-anchor="middle">~ /home/waqqas вҖ” zsh</text>
  </g>

  <!-- Prompt line above the ASCII -->
  <text x="30" y="80" fill="#27C93F" font-size="13">
    <tspan fill="#00D9FF">waqqas@github</tspan><tspan fill="#888">:</tspan><tspan fill="#FFBD2E">~</tspan><tspan fill="#888">$</tspan>
    <tspan fill="#e6edf3"> figlet "WAQQAS"</tspan>
  </text>

  <!-- в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ ASCII ART (revealed via mask) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ -->
  <g mask="url(#reveal)" filter="url(#glow)">
    <text x="500" y="125" text-anchor="middle" fill="#00D9FF" font-size="20" font-weight="bold" xml:space="preserve"> в–Ҳв–Ҳв•—    в–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—</text>
    <text x="500" y="148" text-anchor="middle" fill="#00D9FF" font-size="20" font-weight="bold" xml:space="preserve"> в–Ҳв–Ҳв•‘    в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ</text>
    <text x="500" y="171" text-anchor="middle" fill="#00D9FF" font-size="20" font-weight="bold" xml:space="preserve"> в–Ҳв–Ҳв•‘ в–Ҳв•— в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—</text>
    <text x="500" y="194" text-anchor="middle" fill="#00D9FF" font-size="20" font-weight="bold" xml:space="preserve"> в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–„в–„ в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘в–„в–„ в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘</text>
    <text x="500" y="217" text-anchor="middle" fill="#00D9FF" font-size="20" font-weight="bold" xml:space="preserve"> в•ҡв–Ҳв–Ҳв–Ҳв•”в–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘</text>
    <text x="500" y="240" text-anchor="middle" fill="#00D9FF" font-size="20" font-weight="bold" xml:space="preserve">  в•ҡв•җв•җв•қв•ҡв•җв•җв•қ в•ҡв•җв•қ  в•ҡв•җв•қ в•ҡв•җв•җв–Җв–Җв•җв•қ  в•ҡв•җв•җв–Җв–Җв•җв•қ в•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қ</text>

    <!-- Pulsing opacity on the whole ASCII block for a gentle "alive" feel -->
    <animate attributeName="opacity"
             values="0.85; 1; 0.85"
             dur="3s"
             repeatCount="indefinite"/>
  </g>

  <!-- в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ ROLE LINE (subtitle) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ -->
  <text x="500" y="278" text-anchor="middle" fill="#7d8590" font-size="13">
    <tspan fill="#00D9FF">&gt;</tspan> AI / Full-Stack Software Engineer
    <tspan fill="#444"> В· </tspan>
    <tspan fill="#FF6B35">India</tspan>
  </text>

  <!-- в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ CYCLING TAGLINE (typewriter SMIL) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ -->
  <g transform="translate(500, 310)" text-anchor="middle">
    <text fill="#e6edf3" font-size="14" filter="url(#strongGlow)">
      <tspan fill="#27C93F">$ </tspan>
      <tspan id="tagline" fill="#e6edf3">
        <animate attributeName="opacity"
                 values="0; 1; 1; 0"
                 keyTimes="0; 0.1; 0.9; 1"
                 dur="3.5s"
                 repeatCount="indefinite"/>
        Building LLM-powered production systems
        <animate attributeName="textContent"
                 values="Building LLM-powered production systems;Architecting RAG pipelines &amp; MCP servers;Shipping AI-first SaaS platforms;Where LLMs meet real code"
                 dur="14s"
                 repeatCount="indefinite"/>
      </tspan>
      <!-- Blinking cursor -->
      <tspan fill="#00D9FF" font-weight="bold">
        в–Ҳ
        <animate attributeName="opacity"
                 values="1; 1; 0; 0"
                 keyTimes="0; 0.5; 0.5; 1"
                 dur="1s"
                 repeatCount="indefinite"/>
      </tspan>
    </text>
  </g>

  <!-- в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ CORNER BRACKETS (cyberpunk frame) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ -->
  <g stroke="#00D9FF" stroke-width="2" fill="none" opacity="0.7">
    <!-- top-left -->
    <path d="M 10 10 L 10 30 M 10 10 L 30 10"/>
    <!-- top-right -->
    <path d="M 990 10 L 990 30 M 990 10 L 970 10"/>
    <!-- bottom-left -->
    <path d="M 10 350 L 10 330 M 10 350 L 30 350"/>
    <!-- bottom-right -->
    <path d="M 990 350 L 990 330 M 990 350 L 970 350"/>
  </g>

  <!-- в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ STATUS BAR (bottom) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ -->
  <g font-size="10" fill="#4a5568">
    <text x="20" y="348">[в—Ҹ] online</text>
    <text x="500" y="348" text-anchor="middle">вҖ” available for collaboration вҖ”</text>
    <text x="980" y="348" text-anchor="end">v2.0.0</text>
  </g>

</svg>
